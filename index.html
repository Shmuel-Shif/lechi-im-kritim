<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>לחיים בכריתים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==================== מסך פתיחה ==================== -->
  <section
    id="splash-screen"
    class="screen screen--active"
    aria-label="מסך פתיחה"
    style="background-image: url('assets/images/home-background.png')"
  >
    <div class="splash__overlay"></div>

    <span class="splash__bh" data-i18n="bh">ב״ה</span>

    <button
      type="button"
      class="lang-toggle splash__lang-toggle"
      data-i18n-aria="langToggleAria"
      aria-label="החלפת שפה – עברית / English"
    >
      <span class="lang-toggle__option lang-toggle__option--active" data-lang="he">עב</span>
      <span class="lang-toggle__sep" aria-hidden="true">|</span>
      <span class="lang-toggle__option" data-lang="en">EN</span>
    </button>

    <div class="splash__content">
      <div class="splash__hero">
        <img src="assets/images/logo.png" alt="לחיים בכריתים – LECHAIM The Pearl of Crete" class="splash__logo" id="splash-logo">
        <h1 class="splash__title" data-i18n="welcome">ברוכים הבאים</h1>
      </div>

      <div class="splash__bottom">
        <button type="button" class="btn btn--navy btn--splash" id="btn-start" data-i18n="toMenu">
          לתפריט
        </button>
      </div>
    </div>

    <div class="splash__waves" aria-hidden="true">
      <svg class="wave wave--1" viewBox="0 0 1440 80" preserveAspectRatio="none">
        <path d="M0,40 C180,80 360,0 540,40 C720,80 900,0 1080,40 C1260,80 1440,40 L1440,80 L0,80 Z"/>
      </svg>
      <svg class="wave wave--2" viewBox="0 0 1440 80" preserveAspectRatio="none">
        <path d="M0,50 C240,10 480,70 720,35 C960,0 1200,60 1440,45 L1440,80 L0,80 Z"/>
      </svg>
    </div>
  </section>

  <!-- ==================== מסך תפריט ==================== -->
  <section id="menu-screen" class="screen" aria-label="מסך תפריט" hidden>

    <div class="menu-app">
      <!-- חלק עליון – Header + קטגוריות + כותרת -->
      <div class="menu-top">
        <span class="menu-top__bh" data-i18n="bh">ב״ה</span>

        <header class="menu-header">
          <div class="menu-header__brand">
            <div class="menu-header__logo-group" id="header-logo">
              <img
                src="assets/images/logo-image.png"
                alt=""
                class="menu-header__logo-icon"
                width="76"
                height="76"
              >
              <img
                src="assets/images/logo-text.png"
                alt="לחיים בכריתים – LECHAIM The Pearl of Crete"
                class="menu-header__logo-wordmark"
                width="220"
                height="58"
              >
            </div>
            <div class="menu-header__logo-fallback">
              <span class="menu-header__lyre" aria-hidden="true">♪</span>
              <div class="menu-header__logo-text">
                <strong>LECHAIM</strong>
                <small>• The Pearl of Crete •</small>
              </div>
            </div>
          </div>

          <div class="menu-header__actions">
            <button type="button" class="header-action" id="btn-search-toggle" aria-expanded="false">
              <img src="assets/icons/search.svg" alt="" width="28" height="28">
              <span data-i18n="search">חיפוש</span>
            </button>
            <button type="button" class="header-action header-action--cart" id="btn-open-cart">
              <img src="assets/icons/cart.svg" alt="" width="28" height="28">
              <span class="header-action__badge" id="header-cart-badge" data-count="0">0</span>
              <span data-i18n="myCart">הסל שלי</span>
            </button>
            <button
              type="button"
              class="lang-toggle menu-header__lang-toggle"
              data-i18n-aria="langToggleAria"
              aria-label="החלפת שפה – עברית / English"
            >
              <span class="lang-toggle__option lang-toggle__option--active" data-lang="he">עב</span>
              <span class="lang-toggle__sep" aria-hidden="true">|</span>
              <span class="lang-toggle__option" data-lang="en">EN</span>
            </button>
            <button type="button" class="header-action header-action--icon-only" id="btn-back-home" data-i18n-aria="backHome" aria-label="חזרה למסך הבית">
              <img src="assets/icons/arrow-back.svg" alt="" width="28" height="28">
            </button>
          </div>
        </header>

        <div class="search-panel" id="search-panel" hidden>
          <div class="search-panel__row">
            <button
              type="button"
              class="search-panel__close"
              id="btn-close-search"
              data-i18n-aria="close"
              aria-label="סגור"
            >✕</button>
            <input
              type="text"
              class="search-panel__input"
              id="search-input"
              placeholder="חיפוש לפי שם מנה..."
              data-i18n-placeholder="searchPlaceholder"
              autocomplete="off"
            >
          </div>
        </div>

        <nav class="categories" id="categories-nav" aria-label="קטגוריות תפריט"></nav>

        <h2 class="section-title" id="section-title">
          <img src="assets/icons/leaf-deco.svg" alt="" class="section-title__deco" aria-hidden="true">
          <span class="section-title__text" id="section-title-text">מנות עיקריות</span>
          <img src="assets/icons/leaf-deco.svg" alt="" class="section-title__deco section-title__deco--flip" aria-hidden="true">
        </h2>
      </div>

      <!-- תוכן מנות -->
      <div class="menu-content">
        <div class="dishes-area" id="dishes-area">
          <div class="dishes-grid" id="dishes-grid" role="list"></div>
          <p class="dishes-empty" id="dishes-empty" hidden data-i18n="noResults">לא נמצאו מנות</p>
        </div>
      </div>

      <!-- סרגל סל תחתון -->
      <footer class="cart-bar" id="cart-bar">
        <button type="button" class="cart-bar__expand" id="btn-expand-cart" aria-expanded="false">
          <img src="assets/icons/chevron-up.svg" alt="" class="cart-bar__chevron" width="16" height="16">
          <span id="cart-bar-count">אין פריטים בסל</span>
        </button>
        <div class="cart-bar__actions">
          <div class="cart-bar__total">
            <span class="cart-bar__total-label" data-i18n="total">סה״כ</span>
            <span class="cart-bar__total-amount" id="cart-bar-total">₪0</span>
          </div>
          <span class="cart-bar__divider" aria-hidden="true"></span>
          <button type="button" class="cart-bar__view" id="btn-view-cart" data-i18n="viewCart">
            צפה בסל
          </button>
        </div>
        <div class="cart-bar__meander" aria-hidden="true"></div>
      </footer>
    </div>

    <!-- מגירת סל -->
    <div class="cart-drawer" id="cart-drawer" aria-hidden="true">
      <div class="cart-drawer__backdrop" id="cart-drawer-backdrop"></div>
      <div class="cart-drawer__panel">
        <div class="cart-drawer__header">
          <h2 data-i18n="cartTitle">ההזמנה שלך</h2>
          <button type="button" class="cart-drawer__close" id="btn-close-cart" data-i18n-aria="close" aria-label="סגור">✕</button>
        </div>
        <ul class="cart-drawer__list" id="cart-list" role="list">
          <li class="cart-drawer__empty" id="cart-empty">
            <p data-i18n="cartEmpty">הסל ריק</p>
            <span data-i18n="cartEmptyHint">בחרו מנות מהתפריט</span>
          </li>
        </ul>
        <div class="cart-drawer__footer">
          <div class="cart-drawer__total-row">
            <span data-i18n="total">סה״כ</span>
            <span class="cart-drawer__total-price" id="cart-total">₪0</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- מודל פרטי מנה -->
  <div class="dish-modal" id="dish-modal" aria-hidden="true">
    <div class="dish-modal__backdrop" id="dish-modal-backdrop"></div>
    <div class="dish-modal__panel" role="dialog" aria-modal="true" aria-labelledby="dish-modal-title">
      <button type="button" class="dish-modal__close" id="btn-close-dish-modal" data-i18n-aria="close" aria-label="סגור">✕</button>
      <div class="dish-modal__image-wrap">
        <img class="dish-modal__image" id="dish-modal-image" src="" alt="">
      </div>
      <div class="dish-modal__body">
        <h2 class="dish-modal__name" id="dish-modal-title"></h2>
        <p class="dish-modal__desc" id="dish-modal-desc"></p>
        <div class="dish-modal__footer">
          <span class="dish-modal__price" id="dish-modal-price"></span>
          <button type="button" class="btn-add dish-modal__add" id="btn-modal-add" data-i18n-aria="addToCartModal" aria-label="הוסף לסל">+</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden>
    <span id="toast-message" data-i18n="orderSent">ההזמנה נשלחה למלצר בהצלחה!</span>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
